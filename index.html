<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family Accounting</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--card:#1e1e1e;
  --text:#fff;--text2:#aaa;--text3:#666;
  --green:#34c759;--red:#ff3b30;--blue:#007aff;
  --border:#2a2a2a;--radius:12px;--rsm:8px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:72px;overflow-x:hidden}
.page{display:none;padding:16px;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;cursor:pointer;color:var(--text3);font-size:10px;border:none;background:none;transition:color .15s}
.nav-btn.active{color:var(--blue)}
.nav-btn svg{width:22px;height:22px}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.lbl{font-size:12px;color:var(--text2);margin-bottom:4px}
.val{font-size:24px;font-weight:700}
.val.g{color:var(--green)}.val.r{color:var(--red)}.val.b{color:var(--blue)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:var(--card);border-radius:var(--rsm);padding:14px;border:1px solid var(--border)}
.sc-lbl{font-size:11px;color:var(--text2);margin-bottom:6px}
.sc-val{font-size:18px;font-weight:700}

/* TX ITEM */
.txl{display:flex;flex-direction:column;gap:8px}
.txi{background:var(--card);border-radius:var(--rsm);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);cursor:pointer}
.txi:active{background:var(--bg3)}
.tx-l{display:flex;flex-direction:column;gap:3px}
.tx-t{font-size:14px;font-weight:500}
.tx-m{font-size:11px;color:var(--text2)}
.tx-r{text-align:right}
.tx-s{font-size:15px;font-weight:600}
.tx-n{font-size:11px;color:var(--text3);margin-top:2px}
.bdg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-right:4px}
.bdg.c{background:rgba(255,59,48,.15);color:#ff6b60}
.bdg.k{background:rgba(52,199,89,.15);color:#4cd964}

/* FORM */
.hdr{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.fg{margin-bottom:14px}
.fl{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.bg{display:grid;gap:8px}
.bg.c2{grid-template-columns:1fr 1fr}
.bg.c3{grid-template-columns:1fr 1fr 1fr}
.sb{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:10px;color:var(--text);font-size:13px;cursor:pointer;text-align:center;transition:all .15s}
.sb.on{background:var(--blue);border-color:var(--blue);color:#fff}
input[type=text],input[type=number],input[type=date]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:12px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;color-scheme:dark}
input:focus{border-color:var(--blue)}
.btn-sub{width:100%;background:var(--blue);border:none;border-radius:var(--radius);padding:14px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px}
.btn-sub:active{opacity:.8}
.btn-ref{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:6px 12px;color:var(--text2);font-size:12px;cursor:pointer}

/* LOADER / EMPTY */
.loader{text-align:center;padding:40px;color:var(--text2)}
.sp{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--text3)}
.ei{font-size:40px;margin-bottom:8px}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end}
.mo.open{display:flex}
.md{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto}
.mdh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mdt{font-size:16px;font-weight:700}
.mdc{background:var(--bg3);border:none;border-radius:50%;width:28px;height:28px;color:var(--text);cursor:pointer;font-size:16px}

/* CHART */
.cw{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.ct{font-size:13px;color:var(--text2);margin-bottom:12px}
canvas{max-height:220px}
.ti{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.ti:last-child{border-bottom:none}
.ti-n{flex:1;font-size:13px;padding:0 8px}
.ti-v{font-size:13px;font-weight:600}
.sec{font-size:13px;font-weight:600;color:var(--text2);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.dbdg{font-size:11px;color:var(--text3);padding:3px 8px;background:var(--bg3);border-radius:20px;display:inline-block;margin-bottom:10px}
</style>
</head>
<body>

<!-- PAGES -->
<div id="p-today" class="page active">
  <div class="hdr"><span>Bugungi holat 📊</span><button class="btn-ref" onclick="clearCache();loadToday()">↻</button></div>
  <div id="today-content"><div class="loader"><div class="sp"></div>Yuklanmoqda...</div></div>
</div>

<div id="p-add" class="page">
  <div class="hdr">Yangi amal ➕</div>
  <div class="fg"><label class="fl">Amal turi</label>
    <div class="bg c2">
      <button class="sb on" onclick="selType('CHIQIM',this)">📤 Chiqim</button>
      <button class="sb" onclick="selType('KIRIM',this)">📥 Kirim</button>
    </div>
  </div>
  <div class="fg"><label class="fl">Sana</label><input type="date" id="f-sana"></div>
  <div class="fg"><label class="fl" id="tur-lbl">Chiqim turi</label><div class="bg c2" id="tur-grid"></div></div>
  <div class="fg"><label class="fl">Egasi</label>
    <div class="bg c2">
      <button class="sb on" onclick="selBtn('egasi',this)">👨 Ferudin</button>
      <button class="sb" onclick="selBtn('egasi',this)">👩 Guloyim</button>
    </div>
  </div>
  <div class="fg"><label class="fl">To'lov turi</label>
    <div class="bg c3">
      <button class="sb on" onclick="selBtn('tolov',this)">💵 Cash</button>
      <button class="sb" onclick="selBtn('tolov',this)">💳 Card</button>
      <button class="sb" onclick="selBtn('tolov',this)">📌 Other</button>
    </div>
  </div>
  <div class="fg"><label class="fl">Valyuta</label>
    <div class="bg c2">
      <button class="sb on" onclick="selBtn('valyuta',this)">💵 USD</button>
      <button class="sb" onclick="selBtn('valyuta',this)">🇺🇿 UZS</button>
    </div>
  </div>
  <div class="fg"><label class="fl">Summa</label><input type="number" id="f-summa" placeholder="Masalan: 150 yoki 350000"></div>
  <div class="fg"><label class="fl">Note (ixtiyoriy)</label><input type="text" id="f-note" placeholder="Izoh..."></div>
  <button class="btn-sub" onclick="submitForm()">✅ Saqlash</button>
</div>

<div id="p-filter" class="page">
  <div class="hdr">Qidiruv 🔍</div>
  <div class="card">
    <div class="fg"><label class="fl">Amal turi</label>
      <div class="bg c2">
        <button class="sb on" onclick="fSel('tip','CHIQIM',this)">📤 Chiqim</button>
        <button class="sb" onclick="fSel('tip','KIRIM',this)">📥 Kirim</button>
      </div>
    </div>
    <div class="fg"><label class="fl">Davr</label>
      <div class="bg c2">
        <button class="sb on" onclick="fSel('davr','bu_oy',this)">Bu oy</button>
        <button class="sb" onclick="fSel('davr','otgan_oy',this)">O'tgan oy</button>
        <button class="sb" onclick="fSel('davr','bu_yil',this)">Bu yil</button>
        <button class="sb" onclick="fSel('davr','hammasi',this)">Hammasi</button>
        <button class="sb" style="grid-column:span 2" onclick="fSel('davr','custom',this)">📆 O'z sana oralig'i</button>
      </div>
    </div>
    <div id="custom-range" style="display:none;margin-bottom:14px">
      <div class="fg"><label class="fl">Dan</label><input type="date" id="f-from"></div>
      <div class="fg"><label class="fl">Gacha</label><input type="date" id="f-to"></div>
    </div>
    <div class="fg"><label class="fl" id="f-tur-lbl">Xarajat turi</label>
      <div class="bg c2" id="f-tur-grid"></div>
    </div>
    <button class="btn-sub" onclick="runFilter()">🔍 Ko'rsatish</button>
  </div>
  <div id="filter-result"></div>
</div>

<div id="p-history" class="page">
  <div class="hdr">Tarix 📋</div>
  <div id="history-content"><div class="loader"><div class="sp"></div>Yuklanmoqda...</div></div>
</div>

<div id="p-stats" class="page">
  <div class="hdr">Statistika 📈</div>
  <div id="stats-content"><div class="loader"><div class="sp"></div>Yuklanmoqda...</div></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="goPage('today',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Bugun
  </button>
  <button class="nav-btn" onclick="goPage('add',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>Qo'shish
  </button>
  <button class="nav-btn" onclick="goPage('filter',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Qidiruv
  </button>
  <button class="nav-btn" onclick="goPage('history',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Tarix
  </button>
  <button class="nav-btn" onclick="goPage('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Statistika
  </button>
</nav>

<!-- EDIT MODAL -->
<div class="mo" id="edit-modal" onclick="if(event.target===this)closeMod()">
  <div class="md">
    <div class="mdh"><span class="mdt">Tahrirlash ✏️</span><button class="mdc" onclick="closeMod()">×</button></div>
    <div id="edit-body"></div>
  </div>
</div>

<script>
const API = 'https://worker-production-19c9.up.railway.app';
try{ window.Telegram?.WebApp?.ready(); window.Telegram?.WebApp?.expand(); }catch(e){}

// ── EMOJIS ───────────────────────────────────────────────
const EM = {'OZIQ OVQAT':'🛒','BENZIN':'⛽','RASSROCHKA':'💳','KIYIM KECHAK':'👗',
  'XURSHIDGA':'👨','ISHXONAMGA':'🏢','UYDAGILARGA':'🏠','SHTRAFLAR':'🚫',
  'SHOPPPING':'🛍','ISHXONA REG':'📋','SARTAROSH':'✂️','BOSHQA':'💡',
  'ISHXONA':'🏢','SEEDBEE':'🌱','BUSINESS':'💼','UYDAGILAR':'🏠'};

const CT = ['OZIQ OVQAT','BENZIN','RASSROCHKA','KIYIM KECHAK','XURSHIDGA','ISHXONAMGA','UYDAGILARGA','SHTRAFLAR','SHOPPPING','ISHXONA REG','SARTAROSH','BOSHQA'];
const KT = ['ISHXONA','SEEDBEE','BUSINESS','UYDAGILAR','BOSHQA'];

// ── STATE ────────────────────────────────────────────────
const st  = {type:'CHIQIM',tur:'',egasi:'FERUDIN',tolov:'CASH',valyuta:'USD'};
const fst = {tip:'CHIQIM',davr:'bu_oy',tur:'BARCHASI'};
const edt = {row:0,sheet:'',valyuta:'USD'};

// ── CACHE ────────────────────────────────────────────────
const _c = {};
async function api(url, ttl=60000){
  const now = Date.now();
  if(ttl>0 && _c[url] && now-_c[url].t < ttl) return _c[url].d;
  try{
    const r = await fetch(API+url);
    if(!r.ok) return null;
    const d = await r.json();
    if(ttl>0) _c[url]={d,t:now};
    return d;
  }catch(e){ console.error(url,e); return null; }
}
function clearCache(){ Object.keys(_c).forEach(k=>delete _c[k]); }

// ── NAVIGATION ───────────────────────────────────────────
function goPage(name, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='today')   loadToday();
  if(name==='history') loadHistory();
  if(name==='stats')   loadStats();
  if(name==='add')     initForm();
  if(name==='filter')  initFilter();
}

// ── TODAY ────────────────────────────────────────────────
async function loadToday(){
  const el = document.getElementById('today-content');
  el.innerHTML = '<div class="loader"><div class="sp"></div>Yuklanmoqda...</div>';
  try{
    const [tod, bal] = await Promise.all([api('/today'), api('/balance')]);
    const chU=(tod?.total_ch_usd)||0, chZ=(tod?.total_ch_uzs)||0;
    const kiU=(tod?.total_ki_usd)||0, kiZ=(tod?.total_ki_uzs)||0;
    const balFmt=(bal?.formatted)||'—';
    let h = `
      <div class="card"><div class="lbl">💰 Joriy balans</div><div class="val b">${balFmt}</div></div>
      <div class="grid2">
        <div class="sc"><div class="sc-lbl">📤 Bugungi chiqim</div><div class="sc-val r">${ss(chU,chZ)}</div></div>
        <div class="sc"><div class="sc-lbl">📥 Bugungi kirim</div><div class="sc-val g">${ss(kiU,kiZ)}</div></div>
      </div>
      <div class="dbdg">📅 ${tod?.date||''}</div>`;
    const chs=((tod?.chiqimlar)||[]).filter(t=>(t.usd||0)>0||(t.uzs||0)>0);
    const kis=((tod?.kirimlar)||[]).filter(t=>(t.usd||0)>0||(t.uzs||0)>0);
    if(chs.length){ h+='<div class="sec">Chiqimlar</div><div class="txl">'; chs.forEach(t=>{h+=txi(t,'CHIQIM');}); h+='</div>'; }
    if(kis.length){ h+='<div class="sec">Kirimlar</div><div class="txl">'; kis.forEach(t=>{h+=txi(t,'KIRIM');}); h+='</div>'; }
    if(!chs.length&&!kis.length) h+='<div class="empty"><div class="ei">🌙</div>Bugun hech narsa yo\'q</div>';
    el.innerHTML = h;
  }catch(e){ el.innerHTML='<div class="empty">❌ '+e.message+'</div>'; }
}

// ── ADD FORM ─────────────────────────────────────────────
function initForm(){
  document.getElementById('f-sana').value = new Date().toLocaleDateString('en-CA');
  document.getElementById('f-summa').value = '';
  document.getElementById('f-note').value  = '';
  st.tur = ''; renderTurs();
}
function selType(type, btn){
  st.type=type; st.tur='';
  btn.parentElement.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('tur-lbl').textContent = type==='CHIQIM'?'Chiqim turi':'Kirim turi';
  renderTurs();
}
function renderTurs(){
  const turs = st.type==='CHIQIM'?CT:KT;
  const g = document.getElementById('tur-grid');
  g.className = 'bg '+(turs.length>6?'c3':'c2');
  g.innerHTML = turs.map(t=>`<button class="sb${st.tur===t?' on':''}" onclick="selTur('${t}',this)">${EM[t]||''} ${t}</button>`).join('');
}
function selTur(t, btn){
  st.tur=t;
  document.querySelectorAll('#tur-grid .sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function selBtn(key, btn){
  btn.parentElement.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const txt = btn.textContent.trim();
  if(key==='egasi')   st.egasi   = txt.includes('Ferudin')?'FERUDIN':'GULOYIM';
  if(key==='tolov')   st.tolov   = txt.includes('Cash')?'CASH':txt.includes('Card')?'CARD':'OTHER';
  if(key==='valyuta') st.valyuta = txt.includes('USD')?'USD':'UZS';
}
async function submitForm(){
  if(!st.tur){ alert('Tur tanlang!'); return; }
  const summa = parseFloat(document.getElementById('f-summa').value);
  if(!summa||summa<=0){ alert('Summa kiriting!'); return; }
  const raw = document.getElementById('f-sana').value;
  if(!raw){ alert('Sana kiriting!'); return; }
  const [y,m,d] = raw.split('-');
  const body = {type:st.type,sana:`${d}.${m}.${y}`,egasi:st.egasi,tur:st.tur,tolov:st.tolov,valyuta:st.valyuta,summa,note:document.getElementById('f-note').value||''};
  const btn  = document.querySelector('#p-add .btn-sub');
  btn.textContent='⏳ Saqlanmoqda...'; btn.disabled=true;
  try{
    const r   = await fetch(API+'/transaction',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res = await r.json();
    if(res.success){ clearCache(); btn.textContent='✅ Saqlandi!'; setTimeout(()=>{btn.textContent='✅ Saqlash';btn.disabled=false;},2000); document.getElementById('f-summa').value=''; document.getElementById('f-note').value=''; }
    else throw new Error(res.detail||'Xato');
  }catch(e){ btn.textContent='✅ Saqlash'; btn.disabled=false; alert('Xato: '+e.message); }
}

// ── FILTER ───────────────────────────────────────────────
function initFilter(){
  renderFTurs();
}
function fSel(key, val, btn){
  fst[key]=val;
  btn.parentElement.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(key==='davr') document.getElementById('custom-range').style.display = val==='custom'?'block':'none';
  if(key==='tip')  renderFTurs();
}
function renderFTurs(){
  const turs = ['BARCHASI',...(fst.tip==='CHIQIM'?CT:KT)];
  const g = document.getElementById('f-tur-grid');
  g.className = 'bg c2';
  g.innerHTML = turs.map(t=>`<button class="sb${fst.tur===t?' on':''}" onclick="fst.tur='${t}';renderFTurs()">${t==='BARCHASI'?'📋 Barchasi':(EM[t]||'')+' '+t}</button>`).join('');
  document.getElementById('f-tur-lbl').textContent = fst.tip==='CHIQIM'?'Xarajat turi':'Kirim turi';
}
async function runFilter(){
  const el = document.getElementById('filter-result');
  el.innerHTML = '<div class="loader"><div class="sp"></div>Yuklanmoqda...</div>';
  let url = `/by-filter?tip=${fst.tip}&davr=${fst.davr}&tur=${encodeURIComponent(fst.tur)}`;
  if(fst.davr==='custom'){
    const df=document.getElementById('f-from').value;
    const dt=document.getElementById('f-to').value;
    if(!df||!dt){ el.innerHTML='<div class="empty">❌ Ikkala sanani kiriting</div>'; return; }
    const [y1,m1,d1]=df.split('-'); const [y2,m2,d2]=dt.split('-');
    url+=`&date_from=${d1}.${m1}.${y1}&date_to=${d2}.${m2}.${y2}`;
  }
  const data = await api(url, 0);
  if(!data){ el.innerHTML='<div class="empty">❌ Xato</div>'; return; }
  const rows=(data.rows||[]);
  const davr_map={bu_oy:'Bu oy',otgan_oy:"O'tgan oy",bu_yil:'Bu yil',hammasi:'Hammasi',custom:'Maxsus'};
  const dvt=davr_map[fst.davr]||fst.davr;
  const turt=fst.tur==='BARCHASI'?'Barchasi':fst.tur;
  const ico=fst.tip==='CHIQIM'?'📤':'📥';
  let h=`<div class="dbdg">${ico} ${dvt} · ${turt}</div>`;
  if(!rows.length){ h+='<div class="empty"><div class="ei">🔍</div>Ma\'lumot topilmadi</div>'; }
  else{
    h+=`<div style="font-size:13px;color:var(--text2);margin-bottom:8px">Jami: ${rows.length} ta amal</div><div class="txl">`;
    rows.forEach(t=>{ h+=txi(t,fst.tip,true); });
    h+=`</div><div class="card" style="margin-top:12px"><div class="lbl">📊 JAMI</div><div class="val ${fst.tip==='CHIQIM'?'r':'g'}">${ss(data.total_usd||0,data.total_uzs||0)}</div></div>`;
  }
  el.innerHTML=h;
}

// ── HISTORY ──────────────────────────────────────────────
async function loadHistory(){
  const el = document.getElementById('history-content');
  el.innerHTML='<div class="loader"><div class="sp"></div>Yuklanmoqda...</div>';
  const data = await api('/history?limit=100');
  if(!data){ el.innerHTML='<div class="empty"><div class="ei">❌</div>Xato</div>'; return; }
  const txs=(data.transactions||[]).filter(t=>(t.usd||0)>0||(t.uzs||0)>0);
  if(!txs.length){ el.innerHTML='<div class="empty"><div class="ei">📋</div>Hech narsa yo\'q</div>'; return; }
  let h=`<div style="font-size:13px;color:var(--text2);margin-bottom:8px">Jami: ${txs.length} ta</div><div class="txl">`;
  txs.forEach(t=>{ h+=txi(t,t.type,true); });
  h+='</div>';
  el.innerHTML=h;
}

// ── STATS ────────────────────────────────────────────────
async function loadStats(){
  const el = document.getElementById('stats-content');
  el.innerHTML='<div class="loader"><div class="sp"></div>Yuklanmoqda...</div>';
  const [data,bal] = await Promise.all([api('/stats'),api('/balance')]);
  if(!data){ el.innerHTML='<div class="empty">❌ Xato</div>'; return; }
  const ch=data.chiqim||{}, ki=data.kirim||{};
  const balFmt=(bal?.formatted)||'—';
  let h=`<div class="grid2">
    <div class="sc"><div class="sc-lbl">📤 Jami chiqim</div><div class="sc-val r">${Math.round(ch.total_usd||0)}$</div></div>
    <div class="sc"><div class="sc-lbl">📥 Jami kirim</div><div class="sc-val g">${Math.round(ki.total_usd||0)}$</div></div>
  </div>
  <div class="sc" style="margin-bottom:12px"><div class="sc-lbl">💰 Joriy balans</div><div class="sc-val b">${balFmt}</div></div>
  <div class="sc" style="margin-bottom:12px"><div class="sc-lbl">💹 Sof farq</div><div class="sc-val ${(data.net||0)>=0?'g':'r'}">${(data.net||0)>=0?'+':''}${Math.round(data.net||0)}$</div></div>`;
  const ct=(ch.by_tur||[]), kt=(ki.by_tur||[]);
  if(ct.length) h+='<div class="cw"><div class="ct">📤 Chiqim taqsimoti</div><canvas id="ch-c"></canvas></div>';
  if(kt.length) h+='<div class="cw"><div class="ct">📥 Kirim taqsimoti</div><canvas id="ki-c"></canvas></div>';
  if(ct.length){ h+='<div class="sec">📤 Chiqim reytingi</div><div class="card">'; ct.slice(0,8).forEach((x,i)=>{h+=`<div class="ti"><span style="color:var(--text3);width:20px;font-size:12px">${i+1}</span><span class="ti-n">${EM[x[0]]||''} ${x[0]}</span><span class="ti-v r">${Math.round(x[1])}$</span></div>`;}); h+='</div>'; }
  if(kt.length){ h+='<div class="sec">📥 Kirim reytingi</div><div class="card">'; kt.forEach((x,i)=>{h+=`<div class="ti"><span style="color:var(--text3);width:20px;font-size:12px">${i+1}</span><span class="ti-n">${EM[x[0]]||''} ${x[0]}</span><span class="ti-v g">${Math.round(x[1])}$</span></div>`;}); h+='</div>'; }
  el.innerHTML=h;
  const COLORS_C=['#ff3b30','#ff9500','#ffcc00','#ff6b6b','#e74c3c','#d35400','#e67e22','#f39c12','#c0392b','#FF6633','#FF33FF','#FFFF99'];
  const COLORS_K=['#34c759','#4cd964','#5ac8fa','#007aff','#1e90ff','#00b4d8'];
  if(ct.length){ try{ new Chart(document.getElementById('ch-c'),{type:'doughnut',data:{labels:ct.map(x=>x[0]),datasets:[{data:ct.map(x=>Math.round(x[1])),backgroundColor:COLORS_C}]},options:{plugins:{legend:{display:false}},cutout:'60%'}}); }catch(e){} }
  if(kt.length){ try{ new Chart(document.getElementById('ki-c'),{type:'doughnut',data:{labels:kt.map(x=>x[0]),datasets:[{data:kt.map(x=>Math.round(x[1])),backgroundColor:COLORS_K}]},options:{plugins:{legend:{display:false}},cutout:'60%'}}); }catch(e){} }
}

// ── EDIT ─────────────────────────────────────────────────
function openEdit(row, sheet, usd, uzs, note){
  edt.row=row; edt.sheet=sheet;
  edt.valyuta = usd>0?'USD':'UZS';
  const summa = usd>0?usd:uzs;
  document.getElementById('edit-body').innerHTML=`
    <div class="fg"><label class="fl">Valyuta</label>
      <div class="bg c2">
        <button class="sb${edt.valyuta==='USD'?' on':''}" onclick="edt.valyuta='USD';this.parentElement.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));this.classList.add('on')">💵 USD</button>
        <button class="sb${edt.valyuta==='UZS'?' on':''}" onclick="edt.valyuta='UZS';this.parentElement.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));this.classList.add('on')">🇺🇿 UZS</button>
      </div>
    </div>
    <div class="fg"><label class="fl">Summa</label><input type="number" id="e-summa" value="${summa||0}"></div>
    <div class="fg"><label class="fl">Note</label><input type="text" id="e-note" value="${note||''}"></div>
    <button class="btn-sub" onclick="saveEdit()">💾 Saqlash</button>`;
  document.getElementById('edit-modal').classList.add('open');
}
async function saveEdit(){
  const summa = parseFloat(document.getElementById('e-summa').value)||0;
  const note  = document.getElementById('e-note').value;
  try{
    const r=await fetch(`${API}/transaction/${edt.sheet}/${edt.row}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({summa,note,valyuta:edt.valyuta})});
    const res=await r.json();
    if(res.success){ closeMod(); clearCache(); loadHistory(); loadToday(); }
    else throw new Error(res.detail);
  }catch(e){ alert('Xato: '+e.message); }
}
function closeMod(){ document.getElementById('edit-modal').classList.remove('open'); }

// ── HELPERS ──────────────────────────────────────────────
function ss(u,z){
  const p=[];
  if((u||0)>0) p.push(Math.round(u)+'$');
  if((z||0)>0) p.push(fn(z)+" so'm");
  return p.join(' + ')||'0';
}
function fn(n){ return Math.round(n).toLocaleString('ru-RU'); }
function txi(t, sheet, editable=false){
  const u=t.usd||0, z=t.uzs||0;
  const sum=u>0?Math.round(u)+'$':fn(z)+" so'm";
  const clr=sheet==='CHIQIM'?'r':'g';
  const bdg=sheet==='CHIQIM'?'c':'k';
  const sgn=sheet==='CHIQIM'?'-':'+';
  const oc=editable?`onclick="openEdit(${t.row},'${sheet}',${u},${z},'${(t.note||'').replace(/'/g,"\\'")}')"`:'';
  return `<div class="txi" ${oc}>
    <div class="tx-l">
      <div class="tx-t">${EM[t.tur]||''} ${t.tur}</div>
      <div class="tx-m"><span class="bdg ${bdg}">${sheet}</span>${t.egasi||''} · ${t.sana||''}</div>
      ${t.note?`<div class="tx-n">${t.note}</div>`:''}
    </div>
    <div class="tx-r">
      <div class="tx-s ${clr}">${sgn}${sum}</div>
      <div class="tx-n">${t.tolov||''}</div>
    </div>
  </div>`;
}

// ── INIT ─────────────────────────────────────────────────
initForm();
loadToday();
</script>
