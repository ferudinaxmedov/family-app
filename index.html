<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family Accounting</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--card:#1e1e1e;--text:#fff;--text2:#aaa;--text3:#666;--green:#34c759;--red:#ff3b30;--blue:#007aff;--border:#2a2a2a;--radius:12px;--radius-sm:8px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:70px;overflow-x:hidden}
.page{display:none;padding:16px;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;cursor:pointer;transition:all .2s;color:var(--text3);font-size:10px;border:none;background:none}
.nav-item.active{color:var(--blue)}
.nav-item svg{width:22px;height:22px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.label{font-size:12px;color:var(--text2);margin-bottom:4px}
.value{font-size:24px;font-weight:700}
.value.green{color:var(--green)}
.value.red{color:var(--red)}
.value.blue{color:var(--blue)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border-radius:var(--radius-sm);padding:14px;border:1px solid var(--border)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:6px}
.stat-value{font-size:18px;font-weight:700}
.tx-list{display:flex;flex-direction:column;gap:8px}
.tx-item{background:var(--card);border-radius:var(--radius-sm);padding:12px 14px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);cursor:pointer;transition:background .15s}
.tx-item:active{background:var(--bg3)}
.tx-left{display:flex;flex-direction:column;gap:3px}
.tx-tur{font-size:14px;font-weight:500}
.tx-meta{font-size:11px;color:var(--text2)}
.tx-right{text-align:right}
.tx-sum{font-size:15px;font-weight:600}
.tx-note{font-size:11px;color:var(--text3);margin-top:2px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-right:4px}
.badge.ch{background:rgba(255,59,48,.15);color:#ff6b60}
.badge.ki{background:rgba(52,199,89,.15);color:#4cd964}
.header{font-size:20px;font-weight:700;margin-bottom:16px}
.sub-header{font-size:14px;color:var(--text2);margin-bottom:12px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.btn-grid{display:grid;gap:8px}
.btn-grid.col2{grid-template-columns:1fr 1fr}
.btn-grid.col3{grid-template-columns:1fr 1fr 1fr}
.sel-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;color:var(--text);font-size:13px;cursor:pointer;text-align:center;transition:all .2s}
.sel-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}
input[type=text],input[type=number],input[type=date]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;color-scheme:dark}
input:focus{border-color:var(--blue)}
.submit-btn{width:100%;background:var(--blue);border:none;border-radius:var(--radius);padding:14px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity .2s}
.submit-btn:active{opacity:.8}
.filter-row{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.filter-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:13px;outline:none;color-scheme:dark}
.filter-btn{background:var(--blue);border:none;border-radius:var(--radius-sm);padding:10px 14px;color:#fff;font-size:13px;cursor:pointer}
.loader{text-align:center;padding:40px;color:var(--text2)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:var(--bg3);border:none;border-radius:50%;width:28px;height:28px;color:var(--text);cursor:pointer;font-size:16px}
.chart-wrap{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;border:1px solid var(--border)}
.chart-title{font-size:13px;color:var(--text2);margin-bottom:12px}
canvas{max-height:220px}
.top-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.top-item:last-child{border-bottom:none}
.top-rank{font-size:12px;color:var(--text3);width:20px}
.top-name{flex:1;font-size:13px;padding:0 8px}
.top-val{font-size:13px;font-weight:600}
.section-title{font-size:13px;font-weight:600;color:var(--text2);margin:14px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.date-badge{font-size:11px;color:var(--text3);padding:3px 8px;background:var(--bg3);border-radius:20px;display:inline-block;margin-bottom:10px}
</style>
</head>
<body>
<div id="p-today" class="page active"><div class="header">Bugungi holat 📊</div><div id="today-content"><div class="loader"><div class="spinner"></div>Yuklanmoqda...</div></div></div>
<div id="p-add" class="page">
  <div class="header">Yangi amal ➕</div>
  <div class="form-group"><label class="form-label">Amal turi</label><div class="btn-grid col2"><button class="sel-btn active" onclick="selType('CHIQIM',this)">📤 Chiqim</button><button class="sel-btn" onclick="selType('KIRIM',this)">📥 Kirim</button></div></div>
  <div class="form-group"><label class="form-label">Sana</label><input type="date" id="f-sana"></div>
  <div class="form-group"><label class="form-label" id="tur-label">Chiqim turi</label><div class="btn-grid col2" id="tur-grid"></div></div>
  <div class="form-group"><label class="form-label">Egasi</label><div class="btn-grid col2"><button class="sel-btn active" onclick="selBtn('egasi',this)">👨 Ferudin</button><button class="sel-btn" onclick="selBtn('egasi',this)">👩 Guloyim</button></div></div>
  <div class="form-group"><label class="form-label">To'lov turi</label><div class="btn-grid col3"><button class="sel-btn active" onclick="selBtn('tolov',this)">💵 Cash</button><button class="sel-btn" onclick="selBtn('tolov',this)">💳 Card</button><button class="sel-btn" onclick="selBtn('tolov',this)">📌 Other</button></div></div>
  <div class="form-group"><label class="form-label">Valyuta</label><div class="btn-grid col2"><button class="sel-btn active" onclick="selBtn('valyuta',this)">💵 USD</button><button class="sel-btn" onclick="selBtn('valyuta',this)">🇺🇿 UZS</button></div></div>
  <div class="form-group"><label class="form-label">Summa</label><input type="number" id="f-summa" placeholder="Masalan: 150 yoki 350000"></div>
  <div class="form-group"><label class="form-label">Note (ixtiyoriy)</label><input type="text" id="f-note" placeholder="Izoh..."></div>
  <button class="submit-btn" onclick="submitForm()">✅ Saqlash</button>
</div>
<div id="p-filter" class="page"><div class="header">Qidiruv 🔍</div><div class="filter-row"><input type="date" id="filter-date" class="filter-input"><button class="filter-btn" onclick="loadFilter()">Ko'rsatish</button></div><div id="filter-content"><div class="empty"><div class="empty-icon">📅</div>Sanani tanlang</div></div></div>
<div id="p-history" class="page"><div class="header">Tarix 📋</div><div id="history-content"><div class="loader"><div class="spinner"></div>Yuklanmoqda...</div></div></div>
<div id="p-stats" class="page"><div class="header">Statistika 📈</div><div id="stats-content"><div class="loader"><div class="spinner"></div>Yuklanmoqda...</div></div></div>
<nav class="nav">
  <button class="nav-item active" onclick="goPage('today',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>Bugun</button>
  <button class="nav-item" onclick="goPage('add',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>Qo'shish</button>
  <button class="nav-item" onclick="goPage('filter',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Qidiruv</button>
  <button class="nav-item" onclick="goPage('history',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v10l4 4"/><circle cx="12" cy="12" r="10"/></svg>Tarix</button>
  <button class="nav-item" onclick="goPage('stats',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Statistika</button>
</nav>
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div class="modal-header"><span class="modal-title">Tahrirlash ✏️</span><button class="modal-close" onclick="closeModal()">×</button></div><div id="edit-content"></div></div>
</div>
<script>
const API='https://worker-production-19c9.up.railway.app';
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();}
const state={type:'CHIQIM',tur:'',egasi:'FERUDIN',tolov:'CASH',valyuta:'USD',editRow:0,editSheet:''};
const CT=['OZIQ OVQAT','BENZIN','RASSROCHKA','KIYIM KECHAK','XURSHIDGA','ISHXONAMGA','UYDAGILARGA','SHTRAFLAR','SHOPPPING','ISHXONA REG','SARTAROSH','BOSHQA'];
const KT=['ISHXONA','SEEDBEE','BUSINESS','UYDAGILAR','BOSHQA'];
const EM={'OZIQ OVQAT':'🛒','BENZIN':'⛽','RASSROCHKA':'💳','KIYIM KECHAK':'👗','XURSHIDGA':'👨','ISHXONAMGA':'🏢','UYDAGILARGA':'🏠','SHTRAFLAR':'🚫','SHOPPPING':'🛍','ISHXONA REG':'📋','SARTAROSH':'✂️','BOSHQA':'💡','ISHXONA':'🏢','SEEDBEE':'🌱','BUSINESS':'💼','UYDAGILAR':'🏠'};

function goPage(n,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+n).classList.add('active');
  btn.classList.add('active');
  if(n==='today') loadToday();
  if(n==='history') loadHistory();
  if(n==='stats') loadStats();
  if(n==='add') initForm();
}

async function apiFetch(url){
  try{const r=await fetch(API+url);if(!r.ok)return null;return await r.json();}catch{return null;}
}

async function loadToday(){
  const el=document.getElementById('today-content');
  el.innerHTML='<div class="loader"><div class="spinner"></div>Yuklanmoqda...</div>';
  try{
    const [tod,bal]=await Promise.all([apiFetch('/today'),apiFetch('/balance')]);
    const chU=(tod?.total_ch_usd)||0, chZ=(tod?.total_ch_uzs)||0;
    const kiU=(tod?.total_ki_usd)||0, kiZ=(tod?.total_ki_uzs)||0;
    const balFmt=(bal?.formatted)||'—';
    let html=`<div class="card"><div class="label">💰 Joriy balans</div><div class="value blue">${balFmt}</div></div>
    <div class="grid2">
      <div class="stat-card"><div class="stat-label">📤 Bugungi chiqim</div><div class="stat-value red">${sstr(chU,chZ)}</div></div>
      <div class="stat-card"><div class="stat-label">📥 Bugungi kirim</div><div class="stat-value green">${sstr(kiU,kiZ)}</div></div>
    </div><div class="date-badge">📅 ${tod?.date||''}</div>`;
    const chs=((tod?.chiqimlar)||[]).filter(t=>(t.usd||0)>0||(t.uzs||0)>0);
    const kis=((tod?.kirimlar)||[]).filter(t=>(t.usd||0)>0||(t.uzs||0)>0);
    if(chs.length){html+='<div class="section-title">Chiqimlar</div><div class="tx-list">';chs.forEach(t=>{html+=txItem(t,'CHIQIM');});html+='</div>';}
    if(kis.length){html+='<div class="section-title">Kirimlar</div><div class="tx-list">';kis.forEach(t=>{html+=txItem(t,'KIRIM');});html+='</div>';}
    if(!chs.length&&!kis.length){html+='<div class="empty"><div class="empty-icon">🌙</div>Bugun hech narsa yo\'q</div>';}
    el.innerHTML=html;
  }catch(e){el.innerHTML='<div class="empty">❌ Xato: '+e.message+'</div>';}
}

function initForm(){
  document.getElementById('f-sana').value=new Date().toLocaleDateString('en-CA');
  document.getElementById('f-summa').value='';
  document.getElementById('f-note').value='';
  renderTurs();
}
function selType(type,btn){
  state.type=type;state.tur='';
  document.querySelectorAll('#p-add .btn-grid.col2 .sel-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tur-label').textContent=type==='CHIQIM'?'Chiqim turi':'Kirim turi';
  renderTurs();
}
function renderTurs(){
  const turs=state.type==='CHIQIM'?CT:KT;
  const grid=document.getElementById('tur-grid');
  grid.className='btn-grid '+(turs.length>6?'col3':'col2');
  grid.innerHTML=turs.map(t=>`<button class="sel-btn${state.tur===t?' active':''}" onclick="selTur('${t}',this)">${EM[t]||''} ${t}</button>`).join('');
}
function selTur(t,btn){state.tur=t;document.querySelectorAll('#tur-grid .sel-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function selBtn(key,btn){
  btn.parentElement.querySelectorAll('.sel-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const txt=btn.textContent.trim();
  if(key==='egasi') state.egasi=txt.includes('Ferudin')?'FERUDIN':'GULOYIM';
  if(key==='tolov') state.tolov=txt.includes('Cash')?'CASH':txt.includes('Card')?'CARD':'OTHER';
  if(key==='valyuta') state.valyuta=txt.includes('USD')?'USD':'UZS';
}
async function submitForm(){
  if(!state.tur){alert('Tur tanlang!');return;}
  const summa=parseFloat(document.getElementById('f-summa').value);
  if(!summa||summa<=0){alert('Summa kiriting!');return;}
  const sanaRaw=document.getElementById('f-sana').value;
  if(!sanaRaw){alert('Sana kiriting!');return;}
  const [y,m,d]=sanaRaw.split('-');
  const body={type:state.type,sana:`${d}.${m}.${y}`,egasi:state.egasi,tur:state.tur,tolov:state.tolov,valyuta:state.valyuta,summa,note:document.getElementById('f-note').value||''};
  const btn=document.querySelector('#p-add .submit-btn');
  btn.textContent='⏳ Saqlanmoqda...';btn.disabled=true;
  try{
    const r=await fetch(API+'/transaction',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();
    if(res.success){btn.textContent='✅ Saqlandi!';setTimeout(()=>{btn.textContent='✅ Saqlash';btn.disabled=false;},2000);document.getElementById('f-summa').value='';document.getElementById('f-note').value='';}
    else throw new Error(res.detail||'Xato');
  }catch(e){btn.textContent='✅ Saqlash';btn.disabled=false;alert('Xato: '+e.message);}
}
async function loadFilter(){
  const dateRaw=document.getElementById('filter-date').value;
  if(!dateRaw) return;
  const [y,m,d]=dateRaw.split('-');
  const date=`${d}.${m}.${y}`;
  const el=document.getElementById('filter-content');
  el.innerHTML='<div class="loader"><div class="spinner"></div>Yuklanmoqda...</div>';
  const data=await apiFetch('/by-date?date='+encodeURIComponent(date));
  if(!data){el.innerHTML='<div class="empty">❌ Xato</div>';return;}
  let html=`<div class="date-badge">📅 ${date}</div>`;
  const chs=(data.chiqimlar||[]).filter(t=>(t.usd||0)>0||(t.uzs||0)>0);
  const kis=(data.kirimlar||[]).filter(t=>(t.usd||0)>0||(t.uzs||0)>0);
  if(chs.length){html+='<div class="section-title">Chiqimlar</div><div class="tx-list">';chs.forEach(t=>{html+=txItem(t,'CHIQIM',true);});html+='</div>';}
  if(kis.length){html+='<div class="section-title">Kirimlar</div><div class="tx-list">';kis.forEach(t=>{html+=txItem(t,'KIRIM',true);});html+='</div>';}
  if(!chs.length&&!kis.length){html+='<div class="empty"><div class="empty-icon">🔍</div>Bu sanada ma\'lumot yo\'q</div>';}
  el.innerHTML=html;
}
async function loadHistory(){
  const el=document.getElementById('history-content');
  el.innerHTML='<div class="loader"><div class="spinner"></div>Yuklanmoqda...</div>';
  const data=await apiFetch('/history?limit=100');
  if(!data||!data.transactions){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>Hech narsa yo\'q</div>';return;}
  const txs=(data.transactions||[]).filter(t=>(t.usd||0)>0||(t.uzs||0)>0);
  if(!txs.length){el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>Hech narsa yo\'q</div>';return;}
  let html=`<div class="sub-header">Jami: ${txs.length} ta amal</div><div class="tx-list">`;
  txs.forEach(t=>{html+=txItem(t,t.type,true);});
  html+='</div>';
  el.innerHTML=html;
}
async function loadStats(){
  const el=document.getElementById('stats-content');
  el.innerHTML='<div class="loader"><div class="spinner"></div>Yuklanmoqda...</div>';
  const [data,bal]=await Promise.all([apiFetch('/stats'),apiFetch('/balance')]);
  if(!data){el.innerHTML='<div class="empty">❌ Xato</div>';return;}
  const ch=data.chiqim||{}, ki=data.kirim||{};
  const balFmt=(bal?.formatted)||'—';
  let html=`<div class="grid2">
    <div class="stat-card"><div class="stat-label">📤 Jami chiqim</div><div class="stat-value red">${Math.round(ch.total_usd||0)}$</div></div>
    <div class="stat-card"><div class="stat-label">📥 Jami kirim</div><div class="stat-value green">${Math.round(ki.total_usd||0)}$</div></div>
  </div>
  <div class="stat-card" style="margin-bottom:12px"><div class="stat-label">💰 Joriy balans</div><div class="stat-value blue">${balFmt}</div></div>
  <div class="stat-card" style="margin-bottom:12px"><div class="stat-label">💹 Sof farq</div><div class="stat-value ${(data.net||0)>=0?'green':'red'}">${(data.net||0)>=0?'+':''}${Math.round(data.net||0)}$</div></div>`;
  const chTurs=(ch.by_tur||[]);
  const kiTurs=(ki.by_tur||[]);
  if(chTurs.length){html+='<div class="chart-wrap"><div class="chart-title">📤 Chiqim taqsimoti</div><canvas id="ch-chart"></canvas></div>';}
  if(kiTurs.length){html+='<div class="chart-wrap"><div class="chart-title">📥 Kirim taqsimoti</div><canvas id="ki-chart"></canvas></div>';}
  if(chTurs.length){html+='<div class="section-title">📤 Chiqim reytingi</div><div class="card">';chTurs.slice(0,6).forEach((x,i)=>{html+=`<div class="top-item"><span class="top-rank">${i+1}</span><span class="top-name">${EM[x[0]]||''} ${x[0]}</span><span class="top-val red">${Math.round(x[1])}$</span></div>`;});html+='</div>';}
  if(kiTurs.length){html+='<div class="section-title">📥 Kirim reytingi</div><div class="card">';kiTurs.forEach((x,i)=>{html+=`<div class="top-item"><span class="top-rank">${i+1}</span><span class="top-name">${EM[x[0]]||''} ${x[0]}</span><span class="top-val green">${Math.round(x[1])}$</span></div>`;});html+='</div>';}
  el.innerHTML=html;
  if(chTurs.length){new Chart(document.getElementById('ch-chart'),{type:'doughnut',data:{labels:chTurs.map(x=>x[0]),datasets:[{data:chTurs.map(x=>Math.round(x[1])),backgroundColor:['#ff3b30','#ff9500','#ffcc00','#ff6b6b','#e74c3c','#d35400','#e67e22','#f39c12','#c0392b','#FF6633','#FF33FF','#FFFF99']}]},options:{plugins:{legend:{display:false}},cutout:'60%'}});}
  if(kiTurs.length){new Chart(document.getElementById('ki-chart'),{type:'doughnut',data:{labels:kiTurs.map(x=>x[0]),datasets:[{data:kiTurs.map(x=>Math.round(x[1])),backgroundColor:['#34c759','#4cd964','#5ac8fa','#007aff','#1e90ff','#00b4d8']}]},options:{plugins:{legend:{display:false}},cutout:'60%'}});}
}
function openEdit(row,sheet,tStr){
  const t=JSON.parse(decodeURIComponent(tStr));
  state.editRow=row;state.editSheet=sheet;
  const valyuta=(t.usd||0)>0?'USD':'UZS';
  const summa=(t.usd||0)>0?t.usd:t.uzs;
  document.getElementById('edit-content').innerHTML=`
    <div class="form-group"><div class="label">Tur: <b>${EM[t.tur]||''} ${t.tur}</b> &nbsp; Egasi: <b>${t.egasi}</b></div></div>
    <div class="form-group"><label class="form-label">Valyuta</label><div class="btn-grid col2"><button class="sel-btn${valyuta==='USD'?' active':''}" onclick="selBtn('valyuta',this)">💵 USD</button><button class="sel-btn${valyuta==='UZS'?' active':''}" onclick="selBtn('valyuta',this)">🇺🇿 UZS</button></div></div>
    <div class="form-group"><label class="form-label">Summa</label><input type="number" id="e-summa" value="${summa||0}"></div>
    <div class="form-group"><label class="form-label">Note</label><input type="text" id="e-note" value="${t.note||''}"></div>
    <button class="submit-btn" onclick="saveEdit()">💾 Saqlash</button>`;
  document.getElementById('edit-modal').classList.add('open');
}
async function saveEdit(){
  const summa=parseFloat(document.getElementById('e-summa').value)||0;
  const note=document.getElementById('e-note').value;
  const body={summa,note,valyuta:state.valyuta};
  try{
    const r=await fetch(`${API}/transaction/${state.editSheet}/${state.editRow}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();
    if(res.success){closeModal();loadHistory();loadToday();}
    else throw new Error(res.detail);
  }catch(e){alert('Xato: '+e.message);}
}
function closeModal(){document.getElementById('edit-modal').classList.remove('open');}
function sstr(u,z){const p=[];if((u||0)>0)p.push(Math.round(u)+'$');if((z||0)>0)p.push(fmtN(z)+" so'm");return p.join(' + ')||'0';}
function fmtN(n){return Math.round(n).toLocaleString('ru-RU').replace(/\s/g,' ');}
function txItem(t,sheet,editable=false){
  const u=t.usd||0, z=t.uzs||0;
  const sum=u>0?Math.round(u)+'$':fmtN(z)+" so'm";
  const color=sheet==='CHIQIM'?'red':'green';
  const badge=sheet==='CHIQIM'?'ch':'ki';
  const sign=sheet==='CHIQIM'?'-':'+';
  const tStr=encodeURIComponent(JSON.stringify(t));
  const onclick=editable?`onclick="openEdit(${t.row},'${sheet}','${tStr}')"` : '';
  return `<div class="tx-item" ${onclick}>
    <div class="tx-left">
      <div class="tx-tur">${EM[t.tur]||''} ${t.tur}</div>
      <div class="tx-meta"><span class="badge ${badge}">${sheet}</span>${t.egasi||''} · ${t.sana||''}</div>
      ${t.note?`<div class="tx-note">${t.note}</div>`:''}
    </div>
    <div class="tx-right">
      <div class="tx-sum ${color}">${sign}${sum}</div>
      <div class="tx-note">${t.tolov||''}</div>
    </div>
  </div>`;
}
initForm();
loadToday();
</script>
</body>
</html>
